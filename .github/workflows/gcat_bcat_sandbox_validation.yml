name: GCAT/BCAT StegVerse Sandbox Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "math_solver/validation/gcat_bcat_candidate_validator.py"
      - "math_solver/validation/gcat_bcat_sandbox_adapter.py"
      - "math_solver/validation/candidate_vectors/gcat_bcat/**"
      - ".github/workflows/gcat_bcat_sandbox_validation.yml"

jobs:
  sandbox-validate-gcat-bcat:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run GCAT/BCAT StegVerse sandbox adapter
        run: >
          python math_solver/validation/gcat_bcat_sandbox_adapter.py
          --vectors math_solver/validation/candidate_vectors/gcat_bcat
          --out-dir math_solver/validation/brain_reports

      - name: Add sandbox summary to workflow page
        if: always()
        run: |
          if [ -f math_solver/validation/brain_reports/gcat_bcat_sandbox_summary.md ]; then
            cat math_solver/validation/brain_reports/gcat_bcat_sandbox_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# GCAT/BCAT StegVerse Sandbox Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Sandbox summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload sandbox reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gcat-bcat-sandbox-brain-reports
          path: math_solver/validation/brain_reports/
