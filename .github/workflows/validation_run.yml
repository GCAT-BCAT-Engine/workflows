name: "StegVerse External Problem - Erd\u0151s Class"
'on':
  workflow_dispatch:
    inputs:
      run_id:
        description: External run ID
        required: true
        default: EXT-001
        type: string
      budget_ceiling:
        description: Budget ceiling in USD
        required: true
        default: '50.00'
        type: string
jobs:
  external_solve:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install requests
    - name: Phase 1 - Haiku Classification
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: "cat << 'EOF' > ext_phase1.py\nimport os, requests, json, time\napi_key\
        \ = os.environ['ANTHROPIC_API_KEY']\n\nproblem = \"A primitive set is a set\
        \ of integers greater than 1 where no element divides another. Erd\u0151s\
        \ conjectured that the sum of 1/(n log n) over all n in a primitive set is\
        \ maximized by the set of prime numbers. Prove or disprove this conjecture.\"\
        \n\nprint(\"=== EXTERNAL PHASE 1: Haiku Classification ===\")\nstart = time.time()\n\
        \nresponse = requests.post(\n    \"https://api.anthropic.com/v1/messages\"\
        ,\n    headers={\"x-api-key\": api_key, \"anthropic-version\": \"2023-06-01\"\
        , \"content-type\": \"application/json\"},\n    json={\"model\": \"claude-haiku-4-5\"\
        , \"max_tokens\": 1024, \"messages\": [{\"role\": \"user\", \"content\": f\"\
        Classify this mathematical problem by domain, difficulty, and known results:\
        \ {problem}\"}]}\n)\n\nelapsed = time.time() - start\ndata = response.json()\n\
        tokens_in = data['usage']['input_tokens']\ntokens_out = data['usage']['output_tokens']\n\
        cost = (tokens_in * 1 + tokens_out * 5) / 1000000\n\nprint(f\"Haiku: {tokens_in}\
        \ in, {tokens_out} out, ${cost:.6f}\")\n\nresult = {\"phase\": 1, \"model\"\
        : \"haiku\", \"cost\": cost, \"tokens_in\": tokens_in, \"tokens_out\": tokens_out,\
        \ \"classification\": data['content'][0]['text'][:500]}\nwith open('ext_phase1.json',\
        \ 'w') as f:\n    json.dump(result, f, indent=2)\nEOF\npython3 ext_phase1.py"
    - name: Phase 2 - Sonnet Proof Attempt
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: "cat << 'EOF' > ext_phase2.py\nimport os, requests, json, time\napi_key\
        \ = os.environ['ANTHROPIC_API_KEY']\n\nproblem = \"A primitive set is a set\
        \ of integers greater than 1 where no element divides another. Erd\u0151s\
        \ conjectured that the sum of 1/(n log n) over all n in a primitive set is\
        \ maximized by the set of prime numbers. Provide a proof strategy or identify\
        \ why this remains unsolved.\"\n\nprint(\"=== EXTERNAL PHASE 2: Sonnet Proof\
        \ Attempt ===\")\nstart = time.time()\n\nresponse = requests.post(\n    \"\
        https://api.anthropic.com/v1/messages\",\n    headers={\"x-api-key\": api_key,\
        \ \"anthropic-version\": \"2023-06-01\", \"content-type\": \"application/json\"\
        },\n    json={\"model\": \"claude-sonnet-4-6\", \"max_tokens\": 4096, \"messages\"\
        : [{\"role\": \"user\", \"content\": f\"Analyze this problem deeply. Provide\
        \ proof strategy, known partial results, and identify barriers to full solution:\
        \ {problem}\"}]}\n)\n\nelapsed = time.time() - start\ndata = response.json()\n\
        tokens_in = data['usage']['input_tokens']\ntokens_out = data['usage']['output_tokens']\n\
        base_cost = (tokens_in * 3 + tokens_out * 15) / 1000000\nbatch_cost = base_cost\
        \ * 0.50\n\nprint(f\"Sonnet: {tokens_in} in, {tokens_out} out, batch ${batch_cost:.6f}\"\
        )\n\nresult = {\"phase\": 2, \"model\": \"sonnet\", \"base_cost\": base_cost,\
        \ \"batch_cost\": batch_cost, \"tokens_in\": tokens_in, \"tokens_out\": tokens_out,\
        \ \"latency\": elapsed, \"analysis\": data['content'][0]['text'][:2000]}\n\
        with open('ext_phase2.json', 'w') as f:\n    json.dump(result, f, indent=2)\n\
        EOF\npython3 ext_phase2.py"
    - name: Combine Results
      run: "cat << 'EOF' > ext_combine.py\nimport json\n\nwith open('ext_phase1.json',\
        \ 'r') as f:\n    p1 = json.load(f)\nwith open('ext_phase2.json', 'r') as\
        \ f:\n    p2 = json.load(f)\n\ntotal_cost = p1['cost'] + p2['batch_cost']\n\
        total_tokens = p1['tokens_in'] + p1['tokens_out'] + p2['tokens_in'] + p2['tokens_out']\n\
        \nprint(f\"=== EXTERNAL RESULTS ===\")\nprint(f\"Total cost: ${total_cost:.6f}\"\
        )\nprint(f\"Total tokens: {total_tokens}\")\nprint(f\"Haiku classification:\
        \ {p1['classification'][:100]}...\")\nprint(f\"Sonnet analysis: {p2['analysis'][:100]}...\"\
        )\n\nreport = {\n    \"run_id\": \"EXT-001\",\n    \"problem\": \"Erd\u0151\
        s primitive sets conjecture\",\n    \"total_cost\": total_cost,\n    \"total_tokens\"\
        : total_tokens,\n    \"phases\": [p1, p2],\n    \"cross_domain\": True,\n\
        \    \"domain\": \"number_theory\"\n}\n\nwith open('ext_report.json', 'w')\
        \ as f:\n    json.dump(report, f, indent=2)\nEOF\npython3 ext_combine.py"
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: external-results
        path: ext_*.json
