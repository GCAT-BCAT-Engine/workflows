name: StegVerse Validation Run - REAL
'on':
  workflow_dispatch:
    inputs:
      run_id:
        description: Validation run ID
        required: true
        default: VAL-001
        type: string
      budget_ceiling:
        description: Budget ceiling in USD
        required: true
        default: '10.00'
        type: string
jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install requests
    - name: REAL API CALL - Phase 1
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        RUN_ID: ${{ github.event.inputs.run_id }}
        BUDGET: ${{ github.event.inputs.budget_ceiling }}
      run: "cat << 'EOF' > real_test.py\nimport os\nimport json\nimport requests\n\
        import time\n\napi_key = os.environ['ANTHROPIC_API_KEY']\nrun_id = os.environ['RUN_ID']\n\
        budget = float(os.environ['BUDGET'])\n\nprint(f\"=== REAL Validation Run:\
        \ {run_id} ===\")\nprint(f\"Budget: ${budget}\")\nprint(f\"API Key present:\
        \ {len(api_key) > 20}\")\nprint()\n\n# REAL API CALL to Anthropic\nprint(\"\
        Making real API call to Anthropic...\")\nstart = time.time()\n\nresponse =\
        \ requests.post(\n    \"https://api.anthropic.com/v1/messages\",\n    headers={\n\
        \        \"x-api-key\": api_key,\n        \"anthropic-version\": \"2023-06-01\"\
        ,\n        \"content-type\": \"application/json\"\n    },\n    json={\n  \
        \      \"model\": \"claude-sonnet-4-6\",\n        \"max_tokens\": 1024,\n\
        \        \"messages\": [\n            {\"role\": \"user\", \"content\": \"\
        Analyze this mathematical problem: Formal necessary and sufficient conditions\
        \ for ALLOW gate admissibility in GCAT/BCAT engine. Provide a brief proof\
        \ strategy.\"}\n        ]\n    }\n)\n\nelapsed = time.time() - start\nstatus\
        \ = response.status_code\n\nprint(f\"API Status: {status}\")\nprint(f\"Latency:\
        \ {elapsed:.2f}s\")\n\nif status == 200:\n    data = response.json()\n   \
        \ content = data['content'][0]['text']\n    tokens_in = data['usage']['input_tokens']\n\
        \    tokens_out = data['usage']['output_tokens']\n\n    # Cost calculation:\
        \ Sonnet 4-6 = $3/$15 per MTok\n    cost = (tokens_in * 3 + tokens_out * 15)\
        \ / 1000000\n\n    print(f\"Input tokens: {tokens_in}\")\n    print(f\"Output\
        \ tokens: {tokens_out}\")\n    print(f\"Estimated cost: ${cost:.4f}\")\n \
        \   print(f\"Response preview: {content[:200]}...\")\n\n    result = {\n \
        \       \"status\": \"success\",\n        \"api_status\": status,\n      \
        \  \"latency_seconds\": elapsed,\n        \"input_tokens\": tokens_in,\n \
        \       \"output_tokens\": tokens_out,\n        \"estimated_cost_usd\": cost,\n\
        \        \"budget_remaining\": budget - cost,\n        \"response_preview\"\
        : content[:500]\n    }\nelse:\n    print(f\"Error: {response.text}\")\n  \
        \  result = {\n        \"status\": \"error\",\n        \"api_status\": status,\n\
        \        \"error\": response.text\n    }\n\nwith open(f'real_results_{run_id}.json',\
        \ 'w') as f:\n    json.dump(result, f, indent=2)\n\nprint(f\"\\nResults saved:\
        \ real_results_{run_id}.json\")\nEOF\npython3 real_test.py"
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: real-validation-results
        path: real_results_*.json
