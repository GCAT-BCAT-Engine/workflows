# chf_sandbox_config.yml
# -----------------------------------------------------------------------
# Sandbox suite registry for Consequence Horizon Formalism.
#
# Consumed by:
#   chf_deterministic_validator.py  (via run_sandbox_from_config)
#   chf_sandbox_runner.py           (directly)
#
# Stable dispatcher rule: do not add workflow files.
# Add suites here and implement generators in chf_sandbox_runner.py.
#
# Maturity key:
#   mature:     explicit validated + sandbox expanded (chf-001 to chf-040)
#   expanding:  explicit validated, sandbox expansion in progress (v0.18 target)
#   provisional: scaffold-generated, not evidence-grade (chf-051+)
# -----------------------------------------------------------------------

suites:

  # -------------------------------------------------------------------
  # v0.18 target: agent boundary batch — chf-041 through chf-050
  # All ten gates: explicit validated, now receiving sandbox expansion.
  # -------------------------------------------------------------------

  - id: chf-041-sandbox
    gate: chf-041
    name: Adversarial Prompt / Instruction Boundary Gate
    maturity: expanding
    description: >
      Full truth table over 6 boolean inputs (2^6 = 64 cases).
      Covers INSTRUCTION_ALLOWED, INSTRUCTION_FAIL_CLOSED,
      and INSTRUCTION_QUARANTINED outcome classes.
      Verifies priority ordering: quarantine > override > conceal >
      bypass > scope.

  - id: chf-042-sandbox
    gate: chf-042
    name: Tool Invocation Standing Gate
    maturity: expanding
    description: >
      Full truth table over 7 boolean inputs (2^7 = 128 cases).
      Covers TOOL_INVOCATION_ALLOWED and TOOL_INVOCATION_FAIL_CLOSED.
      Verifies high-impact tool approval requirement as final guard.

  - id: chf-043-sandbox
    gate: chf-043
    name: Secret / Credential Exposure Gate
    maturity: expanding
    description: >
      Truth table over 5 boolean inputs × 5 blast_radius samples
      (160 cases). Covers CREDENTIAL_ACCESS_ALLOWED,
      CREDENTIAL_ACCESS_FAIL_CLOSED, CREDENTIAL_QUARANTINE_REQUIRED.
      Verifies leak quarantine as highest-priority outcome.

  - id: chf-044-sandbox
    gate: chf-044
    name: Data Exfiltration / Boundary Crossing Gate
    maturity: expanding
    description: >
      Full truth table over 6 boolean inputs (2^6 = 64 cases).
      Covers DATA_TRANSFER_ALLOWED and DATA_TRANSFER_FAIL_CLOSED.
      Verifies boundary_crossing_declared as first gate check.

  - id: chf-045-sandbox
    gate: chf-045
    name: Autonomous Recursion Limit Gate
    maturity: expanding
    description: >
      Grid over 5 depth values × 5 budget values × 2^3 boolean combos
      (200 cases). Covers RECURSION_ALLOWED and RECURSION_FAIL_CLOSED.
      Boundary cases at depth=10, budget=0.8 verified explicitly.

  - id: chf-046-sandbox
    gate: chf-046
    name: Model Output Reliance Gate
    maturity: expanding
    description: >
      Grid over 5 confidence values × 5 criticality values × 2^3
      boolean combos (200 cases). Covers OUTPUT_RELIANCE_ALLOWED,
      OUTPUT_RELIANCE_FAIL_CLOSED, OUTPUT_REQUIRES_REVIEW.
      Verifies three-outcome discrimination at criticality boundary.

  - id: chf-047-sandbox
    gate: chf-047
    name: Simulation-to-Reality Transfer Gate
    maturity: expanding
    description: >
      Grid over 5 fidelity values × 5 gap values × 2^3 boolean combos
      (200 cases). Covers SIM_TO_REAL_ALLOWED and
      SIM_TO_REAL_FAIL_CLOSED. Boundary cases at fidelity=0.85
      and gap=0.2 verified explicitly.

  - id: chf-048-sandbox
    gate: chf-048
    name: Governance Capture / Influence Concentration Gate
    maturity: expanding
    description: >
      Grid over 3^4 concentration combos × 3 correlation values
      (243 cases). Covers CAPTURE_CLEAR and CAPTURE_FAIL_CLOSED.
      Verifies each concentration dimension independently triggers
      FAIL_CLOSED at threshold boundary.

  - id: chf-049-sandbox
    gate: chf-049
    name: Dependency Drift / Supply Chain Gate
    maturity: expanding
    description: >
      Grid over 5 age values × 2^4 boolean combos (80 cases).
      Covers DEPENDENCY_STATE_VALID and DEPENDENCY_FAIL_CLOSED.
      Boundary cases at age=365/366 verified explicitly.

  - id: chf-050-sandbox
    gate: chf-050
    name: Emergency Override / Break-Glass Gate
    maturity: expanding
    description: >
      Grid over 5 duration values × 2^4 boolean combos (80 cases).
      Covers EMERGENCY_OVERRIDE_ALLOWED and
      EMERGENCY_OVERRIDE_FAIL_CLOSED.
      Boundary cases at duration=60/61 verified explicitly.
      Verifies multiparty approval as non-bypassable gate.
