# chf_sandbox_config_sprint_a_additions.yml
# ------------------------------------------
# Append these suite entries to chf_sandbox_config.yml
# after the existing chf-050-sandbox entry.

suites:

  - id: chf-056-sandbox
    gate: chf-056
    name: Scientific Claim Escalation Gate
    maturity: expanding
    description: >
      5 speculation_ratio samples × 2^5 boolean combos = 160 cases.
      Three-outcome gate: ALLOW, ESCALATION_REQUIRED, FAIL_CLOSED.
      Verifies conditional: extraordinary_claim only escalates when
      evidence_level_sufficient is false.

  - id: chf-059-sandbox
    gate: chf-059
    name: Deletion / Forgetting / Retention Gate
    maturity: expanding
    description: >
      5 orphan_record_risk samples × 2^5 boolean combos = 160 cases.
      Three-outcome gate: RETENTION_ALLOWED, DELETION_REQUIRED,
      RETENTION_FAIL_CLOSED. Verifies retention_forbidden as hard
      DELETION_REQUIRED trigger regardless of other fields.

  - id: chf-079-sandbox
    gate: chf-079
    name: Specification Drift Detection Gate
    maturity: expanding
    description: >
      7 semantic_drift × 7 structural_drift × 2^3 boolean = 392 cases.
      Three-outcome gate: DRIFT_ACCEPTABLE, DRIFT_QUARANTINE,
      DRIFT_FAIL_CLOSED. Boundary cases at warn=0.05 and
      critical=0.15 verified for both drift dimensions.

  - id: chf-084-sandbox
    gate: chf-084
    name: Quarantine Routing Gate
    maturity: expanding
    description: >
      7 severity samples × 2^5 boolean combos = 224 cases.
      Four-outcome gate: ROUTE_TO_QUARANTINE, ROUTE_TO_REVIEW,
      ROUTING_CLEAR, ROUTING_FAIL_CLOSED. Verifies tamper_suspected
      and authority_unresolved as hard quarantine triggers.

  - id: chf-087-sandbox
    gate: chf-087
    name: Incident Response Gate
    maturity: expanding
    description: >
      7 severity samples × 2^6 boolean combos = 448 cases.
      Four-outcome gate: INCIDENT_ESCALATE, INCIDENT_CONTAIN,
      INCIDENT_MONITOR, INCIDENT_FAIL_CLOSED. Verifies
      data_breach_detected as regulatory escalation override.

  - id: chf-094-sandbox
    gate: chf-094
    name: Adversarial Review Gate
    maturity: expanding
    description: >
      7 severity samples × 2^4 boolean combos = 112 cases.
      Four-outcome gate: FINDING_CRITICAL, FINDING_MINOR,
      REVIEW_CLEAR, REVIEW_FAIL_CLOSED. Verifies
      critical_finding_present as hard block regardless of
      numeric severity score.

  - id: chf-100-sandbox
    gate: chf-100
    name: Phase-One Completion Gate
    maturity: expanding
    description: >
      4 pass_fraction × 4 sandbox_fraction × 4 pub_count ×
      2^5 boolean combos = 2,048 cases.
      Three-outcome gate: PHASE_COMPLETE, PHASE_INCOMPLETE,
      PHASE_BLOCKED. Verifies distinction between blocked
      (critical gap) and incomplete (artifacts pending).
      This is the v0.30 phase receipt gate.

