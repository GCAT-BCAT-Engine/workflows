  - id: chf-079-quarantine-structural-critical
    baseline_hash_present: true
    drift_measurable: true
    semantic_drift: 0.01
    structural_drift: 0.20
    re_validation_receipt_present: false
    expected: DRIFT_QUARANTINE

  - id: chf-079-quarantine-warning-no-receipt
    baseline_hash_present: true
