problem_id: chf-001
title: Minimal 2D Consequence Horizon Model
formalism: consequence_horizon_formalism
model:
  state_space: R2
  center: [0.0, 0.0]
  transition_region: unit_disk
  horizon_radius: 0.8
  cells:
    cell_1: {theta_min: 0, theta_max: 90, rule: allow_if_inside_horizon}
    cell_2: {theta_min: 90, theta_max: 180, rule: allow_if_radius_lte_0_5}
    cell_3: {theta_min: 180, theta_max: 270, rule: deny}
    cell_4: {theta_min: 270, theta_max: 360, rule: fail_closed}
test_cases:
  - id: p1
    point: [0.4, 0.4]
    expected: ALLOW
  - id: p2
    point: [-0.4, 0.4]
    expected: DENY
  - id: p3
    point: [-0.4, -0.4]
    expected: DENY
  - id: p4
    point: [0.7, -0.2]
    expected: FAIL_CLOSED
  - id: p5
    point: [0.9, 0.1]
    expected: DENY
