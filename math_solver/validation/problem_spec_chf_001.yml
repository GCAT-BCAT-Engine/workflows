problem_id: chf-001
title: Minimal 2D Consequence Horizon Model - v0.8a Adversarial Existing-Schema Cases
formalism: consequence_horizon_formalism
model:
  state_space: R2
  center: [0.0, 0.0]
  transition_region: unit_disk
  horizon_radius: 0.8
  cells:
    cell_1: {theta_min: 0, theta_max: 90, rule: allow_if_inside_horizon}
    cell_2: {theta_min: 90, theta_max: 180, rule: allow_if_radius_lte_0_5}
    cell_3: {theta_min: 180, theta_max: 270, rule: deny}
    cell_4: {theta_min: 270, theta_max: 360, rule: fail_closed}
test_cases:
  - id: baseline_p1_cell1_allow
    point: [0.4, 0.4]
    expected: ALLOW
  - id: baseline_p2_cell2_radius_limit_deny
    point: [-0.4, 0.4]
    expected: DENY
  - id: baseline_p3_cell3_forbidden_deny
    point: [-0.4, -0.4]
    expected: DENY
  - id: baseline_p4_cell4_uncertain_fail_closed
    point: [0.7, -0.2]
    expected: FAIL_CLOSED
  - id: baseline_p5_cell1_outside_horizon_deny
    point: [0.9, 0.1]
    expected: DENY

  - id: EDGE_origin_zero_radius_currently_cell1_allow
    point: [0.0, 0.0]
    expected: ALLOW
  - id: EDGE_exact_horizon_cell1_allow
    point: [0.8, 0.0]
    expected: ALLOW
  - id: EDGE_just_outside_horizon_cell1_deny
    point: [0.8001, 0.0]
    expected: DENY
  - id: EDGE_cell2_limit_3_4_5_triangle_allow
    point: [-0.3, 0.4]
    expected: ALLOW
  - id: EDGE_cell2_just_over_limit_3_4_5_triangle_deny
    point: [-0.3001, 0.4]
    expected: DENY
  - id: EDGE_angle_90_boundary_currently_cell2_allow
    point: [0.0, 0.4]
    expected: ALLOW
  - id: EDGE_angle_180_boundary_currently_cell3_deny
    point: [-0.4, 0.0]
    expected: DENY
  - id: EDGE_angle_270_boundary_currently_cell4_fail_closed
    point: [0.0, -0.4]
    expected: FAIL_CLOSED
  - id: STRESS_near_origin_cell4_fail_closed
    point: [0.000001, -0.000001]
    expected: FAIL_CLOSED
  - id: STRESS_diagonal_cell1_exact_horizon_allow
    point: [0.5656854249, 0.5656854249]
    expected: ALLOW

  - id: ADV_cell4_beyond_horizon_denied_before_uncertain_cell
    point: [0.1, -0.9]
    expected: DENY
  - id: ADV_cell2_angle90_over_radius_limit_deny
    point: [0.0, 0.5001]
    expected: DENY
  - id: ADV_cell2_angle90_exact_radius_limit_allow
    point: [0.0, 0.5]
    expected: ALLOW
  - id: ADV_cell3_low_radius_still_forbidden_deny
    point: [-0.01, -0.01]
    expected: DENY
  - id: ADV_cell1_inside_unit_but_outside_horizon_deny
    point: [0.79, 0.2]
    expected: DENY
