problem_id: chf-002
title: Multi-Center Uncertainty Extension
formalism: consequence_horizon_formalism
model:
  state_space: R2
  plausible_centers:
    - [0.0, 0.0]
    - [0.3, 0.0]
  transition_radius: 1.0
  horizon_radius: 0.8
  conservative_rule: require_all_plausible_centers_to_pass
test_cases:
  - id: pA
    point: [0.4, 0.4]
    expected: ALLOW
  - id: pB
    point: [-0.9, 0.0]
    expected: FAIL_CLOSED
  - id: pC
    point: [0.85, 0.0]
    expected: FAIL_CLOSED
