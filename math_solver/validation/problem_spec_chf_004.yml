problem_id: chf-004
title: Observer Projection and Sphericalization - v0.8a Adversarial Existing-Schema Cases
formalism: consequence_horizon_formalism
model:
  distinguishability_threshold: 1.0
  rule: q_observer_equals_resolution_times_probe_capacity_divided_by_distance_times_noise_times_lag
test_cases:
  - id: O_far_low_resolution
    resolution: 0.5
    probe_capacity: 1.0
    distance: 10.0
    noise: 1.0
    lag: 1.0
    expected: SMOOTH_SHELL
  - id: O_near_high_resolution
    resolution: 5.0
    probe_capacity: 2.0
    distance: 2.0
    noise: 1.0
    lag: 1.0
    expected: CELL_RESOLVED
  - id: O_noisy_intermediate
    resolution: 2.0
    probe_capacity: 1.0
    distance: 2.0
    noise: 2.0
    lag: 1.0
    expected: SMOOTH_SHELL

  - id: ADV_exact_threshold_cell_resolved
    resolution: 1.0
    probe_capacity: 1.0
    distance: 1.0
    noise: 1.0
    lag: 1.0
    expected: CELL_RESOLVED
  - id: ADV_just_below_threshold_smooth_shell
    resolution: 0.999
    probe_capacity: 1.0
    distance: 1.0
    noise: 1.0
    lag: 1.0
    expected: SMOOTH_SHELL
  - id: ADV_high_resolution_but_high_lag_smooth_shell
    resolution: 10.0
    probe_capacity: 1.0
    distance: 2.0
    noise: 1.0
    lag: 10.0
    expected: SMOOTH_SHELL
  - id: ADV_low_noise_high_probe_resolves
    resolution: 0.5
    probe_capacity: 2.0
    distance: 1.0
    noise: 0.5
    lag: 1.0
    expected: CELL_RESOLVED
