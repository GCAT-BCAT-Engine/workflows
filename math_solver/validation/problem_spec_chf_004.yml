problem_id: chf-004
title: Observer Projection and Sphericalization
formalism: consequence_horizon_formalism
model:
  distinguishability_threshold: 1.0
  rule: q_observer_equals_resolution_times_probe_capacity_divided_by_distance_times_noise_times_lag
test_cases:
  - id: O_far_low_resolution
    resolution: 0.5
    probe_capacity: 1.0
    distance: 10.0
    noise: 1.0
    lag: 1.0
    expected: SMOOTH_SHELL
  - id: O_near_high_resolution
    resolution: 5.0
    probe_capacity: 2.0
    distance: 2.0
    noise: 1.0
    lag: 1.0
    expected: CELL_RESOLVED
  - id: O_noisy_intermediate
    resolution: 2.0
    probe_capacity: 1.0
    distance: 2.0
    noise: 2.0
    lag: 1.0
    expected: SMOOTH_SHELL
