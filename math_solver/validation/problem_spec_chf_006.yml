  - id: EDGE_axis_x_tie_currently_cell1_allow
    vector: [0.5, 0.0, 0.0]
    expected: ALLOW
  - id: EDGE_axis_negative_x_tie_currently_cell3_fail_closed
    vector: [-0.5, 0.0, 0.0]
    expected: FAIL_CLOSED
  - id: EDGE_axis_z_tie_currently_cell1_allow
