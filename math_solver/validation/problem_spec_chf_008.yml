problem_id: chf-008
title: GCAT/BCAT Local Admissibility Operator Inside a Radial Cell - v0.8a Adversarial Existing-Schema Cases
formalism: consequence_horizon_formalism
model:
  gcat_params:
    K: 2.0
    alpha: 1.0
    beta: 1.0
    gamma: 1.0
    simplex_tolerance: 0.000000001
    invariant_tolerance: 0.000000001
test_cases:
  - id: gcat_allow_balanced
    state: {g: 0.3, c: 0.3, a: 0.04, t: 0.36}
    expected: ALLOW
  - id: gcat_deny_excess_autonomy
    state: {g: 0.2, c: 0.2, a: 0.5, t: 0.1}
    expected: DENY
  - id: gcat_fail_closed_not_simplex
    state: {g: 0.4, c: 0.4, a: 0.3, t: 0.2}
    expected: FAIL_CLOSED

  - id: ADV_zero_autonomy_zero_trust_simplex_allow
    state: {g: 0.5, c: 0.5, a: 0.0, t: 0.0}
    expected: ALLOW
  - id: ADV_negative_component_fail_closed
    state: {g: -0.1, c: 0.5, a: 0.1, t: 0.5}
    expected: FAIL_CLOSED
  - id: ADV_component_greater_than_one_fail_closed
    state: {g: 1.1, c: 0.0, a: 0.0, t: -0.1}
    expected: FAIL_CLOSED
  - id: ADV_low_governance_high_autonomy_deny
    state: {g: 0.05, c: 0.30, a: 0.30, t: 0.35}
    expected: DENY
