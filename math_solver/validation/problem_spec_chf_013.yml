problem_id: chf-013
title: Many-Body Relevance Threshold Gate
formalism: consequence_horizon_formalism
model:
  gate: require_relevance_threshold_or_protected_review
test_cases:
  - id: below_threshold_unprotected
    deformation: 0.05
    epsilon: 0.10
    protected: false
    deformation_known: true
    expected: NO_EFFECT
  - id: above_threshold_unprotected
    deformation: 0.25
    epsilon: 0.10
    protected: false
    deformation_known: true
    expected: DENY
  - id: below_threshold_protected
    deformation: 0.05
    epsilon: 0.10
    protected: true
    deformation_known: true
    expected: FAIL_CLOSED
  - id: unknown_deformation_protected
    epsilon: 0.10
    protected: true
    deformation_known: false
    expected: FAIL_CLOSED
