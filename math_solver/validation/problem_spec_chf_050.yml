    emergency_classification_valid: true
    duration_minutes: 30
    multiparty_approval: true
    post_action_receipt_ready: true
    mandatory_review_scheduled: true
    expected: EMERGENCY_OVERRIDE_ALLOWED
  - id: exact_override_duration_boundary_allowed
    emergency_classification_valid: true
    duration_minutes: 60
    multiparty_approval: true
    post_action_receipt_ready: true
    mandatory_review_scheduled: true
    expected: EMERGENCY_OVERRIDE_ALLOWED
