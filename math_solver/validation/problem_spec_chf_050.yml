    duration_minutes: 30
    multiparty_approval: true
    post_action_receipt_ready: true
    mandatory_review_scheduled: true
    expected: EMERGENCY_OVERRIDE_FAIL_CLOSED
  - id: duration_too_long_fail_closed
    emergency_classification_valid: true
    duration_minutes: 61
    multiparty_approval: true
    post_action_receipt_ready: true
    mandatory_review_scheduled: true
    expected: EMERGENCY_OVERRIDE_FAIL_CLOSED
  - id: multiparty_approval_missing_fail_closed
    emergency_classification_valid: true
    duration_minutes: 30
    multiparty_approval: false
    post_action_receipt_ready: true
    mandatory_review_scheduled: true
    expected: EMERGENCY_OVERRIDE_FAIL_CLOSED
