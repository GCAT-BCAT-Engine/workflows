problem_id: chf-051
title: Human Override and Operator Recovery Gate
formalism: consequence_horizon_formalism
model:
  required_true: [operator_reachable, override_channel_available, revoke_supported, recovery_receipt_ready]
  required_false: [override_blocked]
  min_metrics:
    operator_recovery_score: 0.8
  max_metrics:
    override_latency_seconds: 30
test_cases:
  - id: baseline_allow
    operator_reachable: true
    override_channel_available: true
    revoke_supported: true
    recovery_receipt_ready: true
    override_blocked: false
    operator_recovery_score: 0.8500000000000001
    override_latency_seconds: 29
    expected: ALLOW
  - id: missing_operator_reachable_fail_closed
    operator_reachable: false
    override_channel_available: true
    revoke_supported: true
    recovery_receipt_ready: true
    override_blocked: false
    operator_recovery_score: 0.8500000000000001
    override_latency_seconds: 29
    expected: FAIL_CLOSED
  - id: override_blocked_fail_closed
    operator_reachable: true
    override_channel_available: true
    revoke_supported: true
    recovery_receipt_ready: true
    override_blocked: true
    operator_recovery_score: 0.8500000000000001
    override_latency_seconds: 29
    expected: FAIL_CLOSED
  - id: operator_recovery_score_below_minimum_fail_closed
    operator_reachable: true
    override_channel_available: true
    revoke_supported: true
    recovery_receipt_ready: true
    override_blocked: false
    operator_recovery_score: 0.79
    override_latency_seconds: 29
    expected: FAIL_CLOSED
  - id: operator_recovery_score_exact_boundary_allow
    operator_reachable: true
    override_channel_available: true
    revoke_supported: true
    recovery_receipt_ready: true
    override_blocked: false
    operator_recovery_score: 0.8
    override_latency_seconds: 29
    expected: ALLOW
  - id: override_latency_seconds_above_maximum_fail_closed
    operator_reachable: true
    override_channel_available: true
    revoke_supported: true
    recovery_receipt_ready: true
    override_blocked: false
    operator_recovery_score: 0.8500000000000001
    override_latency_seconds: 31
    expected: FAIL_CLOSED
  - id: override_latency_seconds_exact_boundary_allow
    operator_reachable: true
    override_channel_available: true
    revoke_supported: true
    recovery_receipt_ready: true
    override_blocked: false
    operator_recovery_score: 0.8500000000000001
    override_latency_seconds: 30
    expected: ALLOW
