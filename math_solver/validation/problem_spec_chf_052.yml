problem_id: chf-052
title: AI-to-AI Coordination Boundary Gate
formalism: consequence_horizon_formalism
model:
  required_true: [peer_identity_verified, coordination_scope_declared, shared_receipt_ready, coordination_limit_enforced]
  required_false: [collusion_risk_detected]
  min_metrics:
    coordination_confidence: 0.8
  max_metrics:
    network_fanout: 10
test_cases:
