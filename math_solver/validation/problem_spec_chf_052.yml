    peer_identity_verified: true
    coordination_scope_declared: true
    shared_receipt_ready: true
    coordination_limit_enforced: true
    collusion_risk_detected: false
    coordination_confidence: 0.8500000000000001
    network_fanout: 9
    expected: ALLOW
