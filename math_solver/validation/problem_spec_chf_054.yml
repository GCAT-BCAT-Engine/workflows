problem_id: chf-054
title: Accessibility and Degraded-Authority Recovery Gate
formalism: consequence_horizon_formalism
model:
  required_true: [accessible_recovery_path, alternate_operator_path, degraded_mode_supported, notice_accessible]
  required_false: [lockout_detected]
  min_metrics:
    accessibility_score: 0.8
  max_metrics:
    recovery_burden: 0.3
test_cases:
  - id: baseline_allow
    accessible_recovery_path: true
    alternate_operator_path: true
    degraded_mode_supported: true
    notice_accessible: true
    lockout_detected: false
    accessibility_score: 0.8500000000000001
    recovery_burden: 0.29
    expected: ALLOW
  - id: missing_accessible_recovery_path_fail_closed
    accessible_recovery_path: false
    alternate_operator_path: true
    degraded_mode_supported: true
    notice_accessible: true
    lockout_detected: false
    accessibility_score: 0.8500000000000001
    recovery_burden: 0.29
    expected: FAIL_CLOSED
  - id: lockout_detected_fail_closed
    accessible_recovery_path: true
    alternate_operator_path: true
    degraded_mode_supported: true
    notice_accessible: true
    lockout_detected: true
    accessibility_score: 0.8500000000000001
    recovery_burden: 0.29
    expected: FAIL_CLOSED
  - id: accessibility_score_below_minimum_fail_closed
    accessible_recovery_path: true
    alternate_operator_path: true
    degraded_mode_supported: true
    notice_accessible: true
    lockout_detected: false
    accessibility_score: 0.79
    recovery_burden: 0.29
    expected: FAIL_CLOSED
  - id: accessibility_score_exact_boundary_allow
    accessible_recovery_path: true
    alternate_operator_path: true
    degraded_mode_supported: true
    notice_accessible: true
    lockout_detected: false
    accessibility_score: 0.8
    recovery_burden: 0.29
    expected: ALLOW
  - id: recovery_burden_above_maximum_fail_closed
    accessible_recovery_path: true
    alternate_operator_path: true
    degraded_mode_supported: true
    notice_accessible: true
    lockout_detected: false
    accessibility_score: 0.8500000000000001
    recovery_burden: 0.31
    expected: FAIL_CLOSED
  - id: recovery_burden_exact_boundary_allow
    accessible_recovery_path: true
    alternate_operator_path: true
    degraded_mode_supported: true
    notice_accessible: true
    lockout_detected: false
    accessibility_score: 0.8500000000000001
    recovery_burden: 0.3
    expected: ALLOW
