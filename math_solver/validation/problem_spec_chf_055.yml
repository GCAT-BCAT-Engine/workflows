problem_id: chf-055
title: Epistemic Provenance Gate
formalism: consequence_horizon_formalism
model:
  required_true: [source_trace_present, claim_support_present, uncertainty_label_present, provenance_receipt_ready]
  required_false: [unsupported_assertion]
  min_metrics:
    source_confidence: 0.8
  max_metrics:
    unexplained_claim_fraction: 0.15
test_cases:
  - id: baseline_allow
    source_trace_present: true
    claim_support_present: true
    uncertainty_label_present: true
    provenance_receipt_ready: true
    unsupported_assertion: false
    source_confidence: 0.8500000000000001
    unexplained_claim_fraction: 0.13999999999999999
    expected: ALLOW
  - id: missing_source_trace_present_fail_closed
    source_trace_present: false
    claim_support_present: true
    uncertainty_label_present: true
    provenance_receipt_ready: true
    unsupported_assertion: false
    source_confidence: 0.8500000000000001
    unexplained_claim_fraction: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: unsupported_assertion_fail_closed
    source_trace_present: true
    claim_support_present: true
    uncertainty_label_present: true
    provenance_receipt_ready: true
    unsupported_assertion: true
    source_confidence: 0.8500000000000001
    unexplained_claim_fraction: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: source_confidence_below_minimum_fail_closed
    source_trace_present: true
    claim_support_present: true
    uncertainty_label_present: true
    provenance_receipt_ready: true
    unsupported_assertion: false
    source_confidence: 0.79
    unexplained_claim_fraction: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: source_confidence_exact_boundary_allow
    source_trace_present: true
    claim_support_present: true
    uncertainty_label_present: true
    provenance_receipt_ready: true
    unsupported_assertion: false
    source_confidence: 0.8
    unexplained_claim_fraction: 0.13999999999999999
    expected: ALLOW
  - id: unexplained_claim_fraction_above_maximum_fail_closed
    source_trace_present: true
    claim_support_present: true
    uncertainty_label_present: true
    provenance_receipt_ready: true
    unsupported_assertion: false
    source_confidence: 0.8500000000000001
    unexplained_claim_fraction: 0.16
    expected: FAIL_CLOSED
  - id: unexplained_claim_fraction_exact_boundary_allow
    source_trace_present: true
