problem_id: chf-057
title: Dataset Ingestion and Training Boundary Gate
formalism: consequence_horizon_formalism
model:
  required_true: [dataset_consent_valid, license_valid, purpose_fit, training_receipt_ready]
  required_false: [restricted_dataset_detected]
  min_metrics:
    dataset_quality: 0.8
  max_metrics:
    privacy_risk: 0.2
test_cases:
  - id: baseline_allow
    dataset_consent_valid: true
    license_valid: true
    purpose_fit: true
    training_receipt_ready: true
    restricted_dataset_detected: false
    dataset_quality: 0.8500000000000001
    privacy_risk: 0.19
    expected: ALLOW
  - id: missing_dataset_consent_valid_fail_closed
    dataset_consent_valid: false
    license_valid: true
    purpose_fit: true
    training_receipt_ready: true
    restricted_dataset_detected: false
    dataset_quality: 0.8500000000000001
    privacy_risk: 0.19
    expected: FAIL_CLOSED
  - id: restricted_dataset_detected_fail_closed
    dataset_consent_valid: true
    license_valid: true
    purpose_fit: true
    training_receipt_ready: true
    restricted_dataset_detected: true
    dataset_quality: 0.8500000000000001
    privacy_risk: 0.19
    expected: FAIL_CLOSED
  - id: dataset_quality_below_minimum_fail_closed
    dataset_consent_valid: true
    license_valid: true
    purpose_fit: true
    training_receipt_ready: true
    restricted_dataset_detected: false
    dataset_quality: 0.79
    privacy_risk: 0.19
    expected: FAIL_CLOSED
  - id: dataset_quality_exact_boundary_allow
    dataset_consent_valid: true
    license_valid: true
    purpose_fit: true
    training_receipt_ready: true
    restricted_dataset_detected: false
    dataset_quality: 0.8
    privacy_risk: 0.19
    expected: ALLOW
  - id: privacy_risk_above_maximum_fail_closed
    dataset_consent_valid: true
    license_valid: true
    purpose_fit: true
    training_receipt_ready: true
    restricted_dataset_detected: false
    dataset_quality: 0.8500000000000001
    privacy_risk: 0.21000000000000002
    expected: FAIL_CLOSED
  - id: privacy_risk_exact_boundary_allow
    dataset_consent_valid: true
    license_valid: true
    purpose_fit: true
    training_receipt_ready: true
    restricted_dataset_detected: false
    dataset_quality: 0.8500000000000001
    privacy_risk: 0.2
    expected: ALLOW
