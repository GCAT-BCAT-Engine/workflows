problem_id: chf-059
title: Deletion Forgetting and Retention Gate
formalism: consequence_horizon_formalism
model:
  required_true: [retention_basis_declared, deletion_path_available, tombstone_receipt_ready, downstream_delete_notice_ready]
  required_false: [retention_forbidden]
  min_metrics:
    deletion_confidence: 0.85
  max_metrics:
    orphan_record_risk: 0.15
test_cases:
  - id: baseline_allow
    retention_basis_declared: true
    deletion_path_available: true
    tombstone_receipt_ready: true
    downstream_delete_notice_ready: true
    retention_forbidden: false
    deletion_confidence: 0.9
    orphan_record_risk: 0.13999999999999999
    expected: ALLOW
  - id: missing_retention_basis_declared_fail_closed
    retention_basis_declared: false
    deletion_path_available: true
    tombstone_receipt_ready: true
    downstream_delete_notice_ready: true
    retention_forbidden: false
    deletion_confidence: 0.9
    orphan_record_risk: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: retention_forbidden_fail_closed
    retention_basis_declared: true
    deletion_path_available: true
    tombstone_receipt_ready: true
    downstream_delete_notice_ready: true
    retention_forbidden: true
    deletion_confidence: 0.9
    orphan_record_risk: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: deletion_confidence_below_minimum_fail_closed
    retention_basis_declared: true
    deletion_path_available: true
    tombstone_receipt_ready: true
    downstream_delete_notice_ready: true
    retention_forbidden: false
    deletion_confidence: 0.84
    orphan_record_risk: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: deletion_confidence_exact_boundary_allow
    retention_basis_declared: true
    deletion_path_available: true
    tombstone_receipt_ready: true
    downstream_delete_notice_ready: true
    retention_forbidden: false
    deletion_confidence: 0.85
    orphan_record_risk: 0.13999999999999999
    expected: ALLOW
  - id: orphan_record_risk_above_maximum_fail_closed
    retention_basis_declared: true
    deletion_path_available: true
    tombstone_receipt_ready: true
    downstream_delete_notice_ready: true
    retention_forbidden: false
    deletion_confidence: 0.9
    orphan_record_risk: 0.16
    expected: FAIL_CLOSED
  - id: orphan_record_risk_exact_boundary_allow
    retention_basis_declared: true
    deletion_path_available: true
    tombstone_receipt_ready: true
    downstream_delete_notice_ready: true
    retention_forbidden: false
    deletion_confidence: 0.9
    orphan_record_risk: 0.15
    expected: ALLOW
