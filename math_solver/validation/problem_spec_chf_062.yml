problem_id: chf-062
title: Topology and Boundary Coherence Gate
formalism: consequence_horizon_formalism
model:
  required_true: [topology_declared, boundary_conditions_defined, hole_detection_complete, coverage_receipt_ready]
  required_false: [non_star_shaped_unhandled]
  min_metrics:
    coverage_ratio: 0.95
  max_metrics:
    boundary_ambiguity: 0.05
test_cases:
  - id: baseline_allow
    topology_declared: true
    boundary_conditions_defined: true
    hole_detection_complete: true
    coverage_receipt_ready: true
    non_star_shaped_unhandled: false
    coverage_ratio: 1.0
    boundary_ambiguity: 0.04
    expected: ALLOW
  - id: missing_topology_declared_fail_closed
    topology_declared: false
    boundary_conditions_defined: true
    hole_detection_complete: true
    coverage_receipt_ready: true
    non_star_shaped_unhandled: false
    coverage_ratio: 1.0
    boundary_ambiguity: 0.04
    expected: FAIL_CLOSED
  - id: non_star_shaped_unhandled_fail_closed
    topology_declared: true
    boundary_conditions_defined: true
    hole_detection_complete: true
    coverage_receipt_ready: true
    non_star_shaped_unhandled: true
    coverage_ratio: 1.0
    boundary_ambiguity: 0.04
    expected: FAIL_CLOSED
  - id: coverage_ratio_below_minimum_fail_closed
    topology_declared: true
    boundary_conditions_defined: true
    hole_detection_complete: true
    coverage_receipt_ready: true
    non_star_shaped_unhandled: false
    coverage_ratio: 0.94
    boundary_ambiguity: 0.04
    expected: FAIL_CLOSED
  - id: coverage_ratio_exact_boundary_allow
    topology_declared: true
    boundary_conditions_defined: true
    hole_detection_complete: true
    coverage_receipt_ready: true
    non_star_shaped_unhandled: false
    coverage_ratio: 0.95
    boundary_ambiguity: 0.04
    expected: ALLOW
  - id: boundary_ambiguity_above_maximum_fail_closed
    topology_declared: true
    boundary_conditions_defined: true
    hole_detection_complete: true
    coverage_receipt_ready: true
    non_star_shaped_unhandled: false
    coverage_ratio: 1.0
    boundary_ambiguity: 0.060000000000000005
    expected: FAIL_CLOSED
  - id: boundary_ambiguity_exact_boundary_allow
    topology_declared: true
    boundary_conditions_defined: true
    hole_detection_complete: true
    coverage_receipt_ready: true
    non_star_shaped_unhandled: false
    coverage_ratio: 1.0
    boundary_ambiguity: 0.05
    expected: ALLOW
