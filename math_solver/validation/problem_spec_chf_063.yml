problem_id: chf-063
title: Shell Geometry Consistency Gate
formalism: consequence_horizon_formalism
model:
  required_true: [shell_origin_declared, shell_radius_valid, shell_record_linked, successor_center_defined]
  required_false: [shell_intersection_conflict]
  min_metrics:
    shell_confidence: 0.9
  max_metrics:
    shell_deformation: 0.1
test_cases:
  - id: baseline_allow
    shell_origin_declared: true
    shell_radius_valid: true
    shell_record_linked: true
    successor_center_defined: true
    shell_intersection_conflict: false
    shell_confidence: 0.9500000000000001
    shell_deformation: 0.09000000000000001
    expected: ALLOW
  - id: missing_shell_origin_declared_fail_closed
    shell_origin_declared: false
    shell_radius_valid: true
    shell_record_linked: true
    successor_center_defined: true
    shell_intersection_conflict: false
    shell_confidence: 0.9500000000000001
    shell_deformation: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: shell_intersection_conflict_fail_closed
    shell_origin_declared: true
    shell_radius_valid: true
    shell_record_linked: true
    successor_center_defined: true
    shell_intersection_conflict: true
    shell_confidence: 0.9500000000000001
    shell_deformation: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: shell_confidence_below_minimum_fail_closed
    shell_origin_declared: true
    shell_radius_valid: true
    shell_record_linked: true
    successor_center_defined: true
    shell_intersection_conflict: false
    shell_confidence: 0.89
    shell_deformation: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: shell_confidence_exact_boundary_allow
    shell_origin_declared: true
    shell_radius_valid: true
    shell_record_linked: true
    successor_center_defined: true
    shell_intersection_conflict: false
    shell_confidence: 0.9
    shell_deformation: 0.09000000000000001
    expected: ALLOW
  - id: shell_deformation_above_maximum_fail_closed
    shell_origin_declared: true
    shell_radius_valid: true
    shell_record_linked: true
    successor_center_defined: true
    shell_intersection_conflict: false
    shell_confidence: 0.9500000000000001
    shell_deformation: 0.11
    expected: FAIL_CLOSED
  - id: shell_deformation_exact_boundary_allow
    shell_origin_declared: true
    shell_radius_valid: true
    shell_record_linked: true
    successor_center_defined: true
    shell_intersection_conflict: false
    shell_confidence: 0.9500000000000001
    shell_deformation: 0.1
    expected: ALLOW
