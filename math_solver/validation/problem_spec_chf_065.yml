    recoverability_metric_declared: true
    threshold_basis_declared: true
    collapse_attractor_defined: true
    calibration_receipt_ready: true
    uncalibrated_metric_used: false
    calibration_confidence: 0.8500000000000001
    metric_error: 0.09000000000000001
    expected: ALLOW
  - id: missing_recoverability_metric_declared_fail_closed
    recoverability_metric_declared: false
    threshold_basis_declared: true
    collapse_attractor_defined: true
    calibration_receipt_ready: true
    uncalibrated_metric_used: false
    calibration_confidence: 0.8500000000000001
    metric_error: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: uncalibrated_metric_used_fail_closed
