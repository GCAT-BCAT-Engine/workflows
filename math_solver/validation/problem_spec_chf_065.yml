problem_id: chf-065
title: Recoverability Metric Calibration Gate
formalism: consequence_horizon_formalism
model:
  required_true: [recoverability_metric_declared, threshold_basis_declared, collapse_attractor_defined, calibration_receipt_ready]
  required_false: [uncalibrated_metric_used]
  min_metrics:
    calibration_confidence: 0.8
  max_metrics:
    metric_error: 0.1
test_cases:
