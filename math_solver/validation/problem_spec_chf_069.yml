    counterexample_captured: true
    minimal_repro_ready: true
    severity_classified: true
    triage_receipt_ready: true
    counterexample_suppressed: false
    triage_confidence: 0.8500000000000001
    untriaged_fraction: 0.09000000000000001
    expected: ALLOW
