problem_id: chf-069
title: Counterexample Triage Gate
formalism: consequence_horizon_formalism
model:
  required_true: [counterexample_captured, minimal_repro_ready, severity_classified, triage_receipt_ready]
  required_false: [counterexample_suppressed]
  min_metrics:
    triage_confidence: 0.8
  max_metrics:
    untriaged_fraction: 0.1
test_cases:
