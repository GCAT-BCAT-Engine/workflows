problem_id: chf-078
title: Proof Artifact Custody Gate
formalism: consequence_horizon_formalism
model:
  required_true: [proof_hash_ready, artifact_chain_ready, reviewer_signature_ready, replay_instructions_ready]
  required_false: [proof_artifact_tampered]
  min_metrics:
    artifact_integrity: 0.9
  max_metrics:
    custody_gap: 0.05
test_cases:
  - id: baseline_allow
    proof_hash_ready: true
    artifact_chain_ready: true
    reviewer_signature_ready: true
    replay_instructions_ready: true
    proof_artifact_tampered: false
    artifact_integrity: 0.9500000000000001
    custody_gap: 0.04
    expected: ALLOW
  - id: missing_proof_hash_ready_fail_closed
    proof_hash_ready: false
    artifact_chain_ready: true
    reviewer_signature_ready: true
    replay_instructions_ready: true
    proof_artifact_tampered: false
    artifact_integrity: 0.9500000000000001
    custody_gap: 0.04
    expected: FAIL_CLOSED
  - id: proof_artifact_tampered_fail_closed
    proof_hash_ready: true
    artifact_chain_ready: true
    reviewer_signature_ready: true
    replay_instructions_ready: true
    proof_artifact_tampered: true
    artifact_integrity: 0.9500000000000001
    custody_gap: 0.04
    expected: FAIL_CLOSED
  - id: artifact_integrity_below_minimum_fail_closed
    proof_hash_ready: true
    artifact_chain_ready: true
    reviewer_signature_ready: true
    replay_instructions_ready: true
    proof_artifact_tampered: false
    artifact_integrity: 0.89
    custody_gap: 0.04
    expected: FAIL_CLOSED
  - id: artifact_integrity_exact_boundary_allow
    proof_hash_ready: true
    artifact_chain_ready: true
    reviewer_signature_ready: true
    replay_instructions_ready: true
    proof_artifact_tampered: false
    artifact_integrity: 0.9
    custody_gap: 0.04
    expected: ALLOW
  - id: custody_gap_above_maximum_fail_closed
    proof_hash_ready: true
    artifact_chain_ready: true
    reviewer_signature_ready: true
    replay_instructions_ready: true
    proof_artifact_tampered: false
    artifact_integrity: 0.9500000000000001
    custody_gap: 0.060000000000000005
    expected: FAIL_CLOSED
  - id: custody_gap_exact_boundary_allow
    proof_hash_ready: true
    artifact_chain_ready: true
    reviewer_signature_ready: true
    replay_instructions_ready: true
    proof_artifact_tampered: false
    artifact_integrity: 0.9500000000000001
    custody_gap: 0.05
    expected: ALLOW
