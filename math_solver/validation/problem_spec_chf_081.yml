problem_id: chf-081
title: CI/CD Enforcement Gate
formalism: consequence_horizon_formalism
model:
  required_true: [ci_policy_declared, protected_branch_enabled, required_checks_defined, ci_receipt_ready]
  required_false: [bypass_branch_detected]
  min_metrics:
    ci_confidence: 0.85
  max_metrics:
    ci_gap: 0.1
test_cases:
  - id: baseline_allow
    ci_policy_declared: true
    protected_branch_enabled: true
    required_checks_defined: true
    ci_receipt_ready: true
    bypass_branch_detected: false
    ci_confidence: 0.9
    ci_gap: 0.09000000000000001
    expected: ALLOW
  - id: missing_ci_policy_declared_fail_closed
    ci_policy_declared: false
    protected_branch_enabled: true
    required_checks_defined: true
    ci_receipt_ready: true
    bypass_branch_detected: false
    ci_confidence: 0.9
    ci_gap: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: bypass_branch_detected_fail_closed
    ci_policy_declared: true
    protected_branch_enabled: true
    required_checks_defined: true
    ci_receipt_ready: true
    bypass_branch_detected: true
    ci_confidence: 0.9
    ci_gap: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: ci_confidence_below_minimum_fail_closed
    ci_policy_declared: true
    protected_branch_enabled: true
    required_checks_defined: true
    ci_receipt_ready: true
    bypass_branch_detected: false
    ci_confidence: 0.84
    ci_gap: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: ci_confidence_exact_boundary_allow
    ci_policy_declared: true
    protected_branch_enabled: true
    required_checks_defined: true
    ci_receipt_ready: true
    bypass_branch_detected: false
    ci_confidence: 0.85
    ci_gap: 0.09000000000000001
    expected: ALLOW
  - id: ci_gap_above_maximum_fail_closed
    ci_policy_declared: true
    protected_branch_enabled: true
    required_checks_defined: true
    ci_receipt_ready: true
    bypass_branch_detected: false
    ci_confidence: 0.9
    ci_gap: 0.11
    expected: FAIL_CLOSED
  - id: ci_gap_exact_boundary_allow
    ci_policy_declared: true
    protected_branch_enabled: true
    required_checks_defined: true
    ci_receipt_ready: true
    bypass_branch_detected: false
    ci_confidence: 0.9
    ci_gap: 0.1
    expected: ALLOW
