problem_id: chf-082
title: Repo Organization Ingestion Gate
formalism: consequence_horizon_formalism
model:
  required_true: [source_org_verified, destination_org_verified, ingestion_policy_match, org_receipt_ready]
  required_false: [org_trust_break]
  min_metrics:
    org_trust: 0.85
  max_metrics:
    org_mismatch_risk: 0.15
test_cases:
  - id: baseline_allow
    source_org_verified: true
    destination_org_verified: true
    ingestion_policy_match: true
    org_receipt_ready: true
    org_trust_break: false
    org_trust: 0.9
    org_mismatch_risk: 0.13999999999999999
    expected: ALLOW
  - id: missing_source_org_verified_fail_closed
    source_org_verified: false
    destination_org_verified: true
    ingestion_policy_match: true
    org_receipt_ready: true
    org_trust_break: false
    org_trust: 0.9
    org_mismatch_risk: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: org_trust_break_fail_closed
    source_org_verified: true
    destination_org_verified: true
    ingestion_policy_match: true
    org_receipt_ready: true
    org_trust_break: true
    org_trust: 0.9
    org_mismatch_risk: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: org_trust_below_minimum_fail_closed
    source_org_verified: true
    destination_org_verified: true
    ingestion_policy_match: true
    org_receipt_ready: true
    org_trust_break: false
    org_trust: 0.84
    org_mismatch_risk: 0.13999999999999999
    expected: FAIL_CLOSED
  - id: org_trust_exact_boundary_allow
    source_org_verified: true
    destination_org_verified: true
    ingestion_policy_match: true
    org_receipt_ready: true
    org_trust_break: false
    org_trust: 0.85
    org_mismatch_risk: 0.13999999999999999
    expected: ALLOW
  - id: org_mismatch_risk_above_maximum_fail_closed
    source_org_verified: true
    destination_org_verified: true
    ingestion_policy_match: true
    org_receipt_ready: true
    org_trust_break: false
    org_trust: 0.9
    org_mismatch_risk: 0.16
    expected: FAIL_CLOSED
  - id: org_mismatch_risk_exact_boundary_allow
    source_org_verified: true
    destination_org_verified: true
    ingestion_policy_match: true
    org_receipt_ready: true
    org_trust_break: false
    org_trust: 0.9
    org_mismatch_risk: 0.15
    expected: ALLOW
