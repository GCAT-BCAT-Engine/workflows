problem_id: chf-086
title: Production Dry-Run Gate
formalism: consequence_horizon_formalism
model:
  required_true: [dry_run_environment_declared, production_delta_measured, dry_run_receipt_ready, go_no_go_policy_ready]
  required_false: [dry_run_nonrepresentative]
  min_metrics:
    dry_run_confidence: 0.85
  max_metrics:
    production_delta: 0.1
test_cases:
  - id: baseline_allow
    dry_run_environment_declared: true
    production_delta_measured: true
    dry_run_receipt_ready: true
    go_no_go_policy_ready: true
    dry_run_nonrepresentative: false
    dry_run_confidence: 0.9
    production_delta: 0.09000000000000001
    expected: ALLOW
  - id: missing_dry_run_environment_declared_fail_closed
    dry_run_environment_declared: false
    production_delta_measured: true
    dry_run_receipt_ready: true
    go_no_go_policy_ready: true
    dry_run_nonrepresentative: false
    dry_run_confidence: 0.9
    production_delta: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: dry_run_nonrepresentative_fail_closed
    dry_run_environment_declared: true
    production_delta_measured: true
    dry_run_receipt_ready: true
    go_no_go_policy_ready: true
    dry_run_nonrepresentative: true
