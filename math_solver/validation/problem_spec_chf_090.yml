problem_id: chf-090
title: Production Promotion Gate
formalism: consequence_horizon_formalism
model:
  required_true: [promotion_policy_declared, approval_chain_valid, rollback_ready, promotion_receipt_ready]
  required_false: [promotion_blocker_present]
  min_metrics:
    promotion_confidence: 0.85
  max_metrics:
    promotion_risk: 0.15
test_cases:
  - id: baseline_allow
    promotion_policy_declared: true
    approval_chain_valid: true
    rollback_ready: true
    promotion_receipt_ready: true
    promotion_blocker_present: false
    promotion_confidence: 0.9
    promotion_risk: 0.13999999999999999
    expected: ALLOW
