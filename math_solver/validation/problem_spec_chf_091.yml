problem_id: chf-091
title: Patent Boundary Gate
formalism: consequence_horizon_formalism
model:
  required_true: [novelty_boundary_declared, inventor_notes_preserved, prior_art_search_ready, claim_receipt_ready]
  required_false: [public_disclosure_risk_unhandled]
  min_metrics:
    patent_confidence: 0.75
  max_metrics:
    claim_overlap_risk: 0.25
test_cases:
