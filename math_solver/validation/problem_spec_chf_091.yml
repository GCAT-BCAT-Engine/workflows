    novelty_boundary_declared: false
    inventor_notes_preserved: true
    prior_art_search_ready: true
    claim_receipt_ready: true
    public_disclosure_risk_unhandled: false
    patent_confidence: 0.8
    claim_overlap_risk: 0.24
    expected: FAIL_CLOSED
