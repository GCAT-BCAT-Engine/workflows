problem_id: chf-092
title: Whitepaper Claim Gate
formalism: consequence_horizon_formalism
model:
  required_true: [claim_scope_declared, evidence_linked, limitations_declared, citation_plan_ready]
  required_false: [unsupported_whitepaper_claim]
  min_metrics:
    whitepaper_confidence: 0.8
  max_metrics:
    citation_gap: 0.1
test_cases:
