    claim_scope_declared: true
    evidence_linked: true
    limitations_declared: true
    citation_plan_ready: true
    unsupported_whitepaper_claim: false
    whitepaper_confidence: 0.8500000000000001
    citation_gap: 0.09000000000000001
    expected: ALLOW
