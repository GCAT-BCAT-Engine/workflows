problem_id: chf-097
title: LinkedIn Publication Gate
formalism: consequence_horizon_formalism
model:
  required_true: [audience_scope_declared, claim_boundary_declared, public_summary_ready, publication_receipt_ready]
  required_false: [viral_overclaim_risk]
  min_metrics:
    publication_confidence: 0.8
  max_metrics:
    misinterpretation_risk: 0.2
test_cases:
  - id: baseline_allow
    audience_scope_declared: true
    claim_boundary_declared: true
    public_summary_ready: true
    publication_receipt_ready: true
    viral_overclaim_risk: false
    publication_confidence: 0.8500000000000001
    misinterpretation_risk: 0.19
    expected: ALLOW
  - id: missing_audience_scope_declared_fail_closed
    audience_scope_declared: false
    claim_boundary_declared: true
    public_summary_ready: true
    publication_receipt_ready: true
    viral_overclaim_risk: false
    publication_confidence: 0.8500000000000001
    misinterpretation_risk: 0.19
    expected: FAIL_CLOSED
  - id: viral_overclaim_risk_fail_closed
    audience_scope_declared: true
    claim_boundary_declared: true
    public_summary_ready: true
    publication_receipt_ready: true
    viral_overclaim_risk: true
    publication_confidence: 0.8500000000000001
    misinterpretation_risk: 0.19
    expected: FAIL_CLOSED
  - id: publication_confidence_below_minimum_fail_closed
    audience_scope_declared: true
    claim_boundary_declared: true
    public_summary_ready: true
    publication_receipt_ready: true
    viral_overclaim_risk: false
    publication_confidence: 0.79
    misinterpretation_risk: 0.19
    expected: FAIL_CLOSED
  - id: publication_confidence_exact_boundary_allow
    audience_scope_declared: true
    claim_boundary_declared: true
    public_summary_ready: true
    publication_receipt_ready: true
    viral_overclaim_risk: false
    publication_confidence: 0.8
    misinterpretation_risk: 0.19
    expected: ALLOW
  - id: misinterpretation_risk_above_maximum_fail_closed
    audience_scope_declared: true
    claim_boundary_declared: true
    public_summary_ready: true
    publication_receipt_ready: true
    viral_overclaim_risk: false
    publication_confidence: 0.8500000000000001
    misinterpretation_risk: 0.21000000000000002
    expected: FAIL_CLOSED
  - id: misinterpretation_risk_exact_boundary_allow
    audience_scope_declared: true
    claim_boundary_declared: true
    public_summary_ready: true
    publication_receipt_ready: true
    viral_overclaim_risk: false
    publication_confidence: 0.8500000000000001
    misinterpretation_risk: 0.2
    expected: ALLOW
