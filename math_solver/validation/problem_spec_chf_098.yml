problem_id: chf-098
title: Research Outreach Gate
formalism: consequence_horizon_formalism
model:
  required_true: [target_audience_declared, evidence_packet_ready, ask_defined, outreach_receipt_ready]
  required_false: [outreach_misalignment]
  min_metrics:
    outreach_confidence: 0.75
  max_metrics:
    recipient_mismatch_risk: 0.2
