problem_id: chf-101
title: Post-Phase Extension Admission Gate
formalism: consequence_horizon_formalism
model:
  required_true: [extension_scope_declared, phase_two_boundary_defined, legacy_compatibility_checked, extension_receipt_ready]
  required_false: [phase_scope_conflict]
  min_metrics:
    extension_confidence: 0.85
  max_metrics:
    legacy_break_risk: 0.1
test_cases:
  - id: baseline_allow
    extension_scope_declared: true
    phase_two_boundary_defined: true
    legacy_compatibility_checked: true
    extension_receipt_ready: true
    phase_scope_conflict: false
    extension_confidence: 0.9
    legacy_break_risk: 0.09000000000000001
    expected: ALLOW
  - id: missing_extension_scope_declared_fail_closed
    extension_scope_declared: false
    phase_two_boundary_defined: true
    legacy_compatibility_checked: true
    extension_receipt_ready: true
    phase_scope_conflict: false
    extension_confidence: 0.9
    legacy_break_risk: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: phase_scope_conflict_fail_closed
    extension_scope_declared: true
    phase_two_boundary_defined: true
    legacy_compatibility_checked: true
    extension_receipt_ready: true
    phase_scope_conflict: true
    extension_confidence: 0.9
    legacy_break_risk: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: extension_confidence_below_minimum_fail_closed
    extension_scope_declared: true
    phase_two_boundary_defined: true
    legacy_compatibility_checked: true
    extension_receipt_ready: true
    phase_scope_conflict: false
    extension_confidence: 0.84
    legacy_break_risk: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: extension_confidence_exact_boundary_allow
    extension_scope_declared: true
    phase_two_boundary_defined: true
    legacy_compatibility_checked: true
    extension_receipt_ready: true
    phase_scope_conflict: false
    extension_confidence: 0.85
    legacy_break_risk: 0.09000000000000001
    expected: ALLOW
  - id: legacy_break_risk_above_maximum_fail_closed
    extension_scope_declared: true
    phase_two_boundary_defined: true
    legacy_compatibility_checked: true
    extension_receipt_ready: true
    phase_scope_conflict: false
    extension_confidence: 0.9
    legacy_break_risk: 0.11
    expected: FAIL_CLOSED
  - id: legacy_break_risk_exact_boundary_allow
    extension_scope_declared: true
    phase_two_boundary_defined: true
    legacy_compatibility_checked: true
    extension_receipt_ready: true
    phase_scope_conflict: false
    extension_confidence: 0.9
    legacy_break_risk: 0.1
