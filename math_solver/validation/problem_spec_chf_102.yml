problem_id: chf-102
title: Recursive Formalism Upgrade Gate
formalism: consequence_horizon_formalism
model:
  required_true: [upgrade_scope_declared, old_new_mapping_ready, migration_receipt_ready, rollback_path_ready]
  required_false: [upgrade_invariant_break]
  min_metrics:
    upgrade_confidence: 0.85
  max_metrics:
    migration_gap: 0.1
test_cases:
  - id: baseline_allow
    upgrade_scope_declared: true
    old_new_mapping_ready: true
    migration_receipt_ready: true
    rollback_path_ready: true
    upgrade_invariant_break: false
    upgrade_confidence: 0.9
    migration_gap: 0.09000000000000001
    expected: ALLOW
  - id: missing_upgrade_scope_declared_fail_closed
    upgrade_scope_declared: false
    old_new_mapping_ready: true
    migration_receipt_ready: true
    rollback_path_ready: true
    upgrade_invariant_break: false
    upgrade_confidence: 0.9
    migration_gap: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: upgrade_invariant_break_fail_closed
    upgrade_scope_declared: true
    old_new_mapping_ready: true
    migration_receipt_ready: true
    rollback_path_ready: true
    upgrade_invariant_break: true
    upgrade_confidence: 0.9
    migration_gap: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: upgrade_confidence_below_minimum_fail_closed
    upgrade_scope_declared: true
    old_new_mapping_ready: true
    migration_receipt_ready: true
    rollback_path_ready: true
    upgrade_invariant_break: false
    upgrade_confidence: 0.84
    migration_gap: 0.09000000000000001
    expected: FAIL_CLOSED
  - id: upgrade_confidence_exact_boundary_allow
    upgrade_scope_declared: true
    old_new_mapping_ready: true
    migration_receipt_ready: true
    rollback_path_ready: true
    upgrade_invariant_break: false
    upgrade_confidence: 0.85
    migration_gap: 0.09000000000000001
    expected: ALLOW
  - id: migration_gap_above_maximum_fail_closed
    upgrade_scope_declared: true
    old_new_mapping_ready: true
    migration_receipt_ready: true
    rollback_path_ready: true
    upgrade_invariant_break: false
    upgrade_confidence: 0.9
    migration_gap: 0.11
    expected: FAIL_CLOSED
  - id: migration_gap_exact_boundary_allow
    upgrade_scope_declared: true
    old_new_mapping_ready: true
    migration_receipt_ready: true
    rollback_path_ready: true
    upgrade_invariant_break: false
    upgrade_confidence: 0.9
    migration_gap: 0.1
    expected: ALLOW
