problem_id: chf-104
title: Cross-Org Trust Federation Gate
formalism: consequence_horizon_formalism
model:
  required_true: [federation_scope_declared, trust_policy_matched, mutual_receipts_ready, revocation_path_ready]
  required_false: [federation_trust_break]
  min_metrics:
    federation_confidence: 0.8
  max_metrics:
    trust_gap: 0.15
test_cases:
  - id: baseline_allow
    federation_scope_declared: true
    trust_policy_matched: true
    mutual_receipts_ready: true
    revocation_path_ready: true
    federation_trust_break: false
    federation_confidence: 0.8500000000000001
    trust_gap: 0.13999999999999999
    expected: ALLOW
