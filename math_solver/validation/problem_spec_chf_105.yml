problem_id: chf-105
title: Multi-Formalism Conflict Arbitration Gate
formalism: consequence_horizon_formalism
model:
  required_true: [conflict_declared, priority_rule_defined, affected_formalisms_listed, arbitration_receipt_ready]
  required_false: [unresolved_formalism_conflict]
  min_metrics:
    arbitration_confidence: 0.8
  max_metrics:
    priority_ambiguity: 0.1
