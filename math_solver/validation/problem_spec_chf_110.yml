problem_id: chf-110
title: CHF Phase-Two Launch Gate
formalism: consequence_horizon_formalism
model:
  required_true: [phase_two_scope_ready, phase_one_archive_complete, new_gate_policy_ready, launch_receipt_ready]
  required_false: [phase_two_blocker_present]
  min_metrics:
    launch_confidence: 0.9
  max_metrics:
    launch_gap: 0.05
